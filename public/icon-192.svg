  <!-- Stars around circle -->
  <circle cx="153" cy="96" r="3" fill="white"/>
  <circle cx="144" cy="134" r="3" fill="white"/>
  <circle cx="115" cy="160" r="3" fill="white"/>
  <circle cx="77" cy="160" r="3" fill="white"/>
  <circle cx="48" cy="134" r="3" fill="white"/>
  <circle cx="39" cy="96" r="3" fill="white"/>
  <circle cx="48" cy="58" r="3" fill="white"/>
  <circle cx="77" cy="32" r="3" fill="white"/>
  <circle cx="115" cy="32" r="3" fill="white"/>
  <circle cx="144" cy="58" r="3" fill="white"/>
  
  <!-- Center circle -->
  <circle cx="96" cy="96" r="29" fill="none" stroke="#1a1a2e" stroke-width="3"/>
  
